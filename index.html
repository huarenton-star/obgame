<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0f1117;color:#e8eaf0;height:100vh;font-size:13px;line-height:1.5;overflow:hidden;display:flex;flex-direction:column}
.app{display:flex;flex:1;overflow:hidden}
.sb{width:200px;min-width:200px;background:#161b27;border-right:1px solid #2a3349;display:flex;flex-direction:column;overflow-y:auto}
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sbs{padding:10px 12px;border-bottom:1px solid #2a3349}
.sbl{font-size:9px;font-weight:600;color:#5a6478;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.ptn{font-size:16px;font-weight:700}
.pts{font-size:11px;color:#8892a4;margin-top:2px}
.bdg{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:5px}
.by{background:#2e200a;color:#f59e0b;border:1px solid #5a3a0a}
.br{background:#2e0a0a;color:#ef4444;border:1px solid #5a1212}
.bg{background:#0a2e1a;color:#22c55e;border:1px solid #0a3a1a}
.vg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.vc{background:#1e2535;border-radius:8px;border:1px solid #2a3349;padding:7px 8px}
.vcl{font-size:9px;font-weight:600;color:#5a6478;text-transform:uppercase}
.vcv{font-size:16px;font-weight:700;margin-top:1px}
.red{color:#ef4444}.grn{color:#22c55e}.vcu{font-size:9px;color:#5a6478}
.scb{background:#1e2535;border:1px solid #2a3349;border-radius:8px;padding:9px 10px}
.scr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.scn{font-size:20px;font-weight:700;color:#22c55e}
.sct{height:4px;background:#252d40;border-radius:2px;overflow:hidden}
.scf{height:100%;border-radius:2px;background:#22c55e}
.phb{background:#1e2535;border:1px solid #2a3349;border-radius:8px;padding:9px 10px}
.pds{display:flex;gap:4px;margin-top:5px}
.pd{width:7px;height:7px;border-radius:50%;background:#3a4566}
.pd.dn{background:#22c55e}.pd.ac{background:#2dd4bf}
.dl{display:flex;flex-direction:column;gap:4px}
.di{background:#1e2535;border:1px solid #2a3349;border-radius:8px;padding:7px 10px;cursor:pointer;font-size:11px;text-align:left;color:#8892a4;width:100%}
.di:hover{border-color:#2dd4bf;color:#2dd4bf}
.tb{padding:9px 16px;border-bottom:1px solid #2a3349;background:#161b27;display:flex;align-items:center;gap:10px;flex-shrink:0}
.tp{font-size:12px;font-weight:600;color:#2dd4bf}
.tt{font-size:12px;color:#8892a4}
.sa{flex:1;overflow-y:auto;padding:16px}
.cd{background:#161b27;border:1px solid #2a3349;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.ct{font-size:13px;font-weight:700;margin-bottom:8px}
.cb{font-size:12px;color:#8892a4;line-height:1.75}
.al{border-radius:8px;padding:9px 13px;font-size:12px;margin-bottom:10px}
.ar{background:#2e0a0a;border:1px solid #5a1212;color:#fca5a5}
.ay{background:#2e200a;border:1px solid #5a3a0a;color:#fcd34d}
.ab{background:#0a1a2e;border:1px solid #1a2a4a;color:#93c5fd}
.ag{background:#0a2e1a;border:1px solid #0a3a1a;color:#86efac}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:4px}
.cbtn{background:#1e2535;border:1px solid #3a4566;border-radius:8px;padding:9px 12px;color:#e8eaf0;font-size:12px;font-weight:500;cursor:pointer;text-align:left;display:flex;align-items:flex-start;gap:7px;line-height:1.5;width:100%}
.cbtn:hover{background:#252d40;border-color:#2dd4bf;color:#2dd4bf}
.cbtn.used{opacity:0.4;cursor:default;pointer-events:none}
.rt{width:100%;border-collapse:collapse}
.rt tr{border-bottom:1px solid #2a3349}
.rt tr:last-child{border-bottom:none}
.rt td{padding:5px 2px;font-size:11px;color:#8892a4}
.rt td:last-child{text-align:right;font-weight:600}
.hi{color:#ef4444}.lo{color:#f59e0b}.ok{color:#22c55e}.nm{color:#e8eaf0}
.rs{font-size:9px;font-weight:600;color:#5a6478;text-transform:uppercase;padding:6px 2px 3px}
.qc{background:#161b27;border:2px solid #2dd4bf;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.qq{font-size:13px;font-weight:600;color:#2dd4bf;margin-bottom:12px;line-height:1.6}
.qo{display:flex;flex-direction:column;gap:6px}
.qb{background:#1e2535;border:1px solid #3a4566;border-radius:8px;padding:9px 13px;cursor:pointer;font-size:12px;text-align:left;color:#e8eaf0;width:100%}
.qb:hover{border-color:#60a5fa;color:#60a5fa}
.qb.cor{background:#0a2e1a;border-color:#22c55e;color:#86efac;pointer-events:none}
.qb.wrg{background:#2e0a0a;border-color:#ef4444;color:#fca5a5;pointer-events:none}
.qb.rev{background:#0a2e1a;border-color:#22c55e;color:#86efac;opacity:0.7;pointer-events:none}
.qb.off{pointer-events:none}
.nb{background:#2dd4bf;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:600;color:#0a2020;cursor:pointer;margin-top:10px;display:block}
.gb{background:#1e2535;border:1px solid #3a4566;border-radius:8px;padding:8px 16px;font-size:12px;color:#8892a4;cursor:pointer}
.gb:hover{color:#e8eaf0;border-color:#8892a4}
.sp{display:inline-flex;gap:4px}
.sp span{width:5px;height:5px;background:#2dd4bf;border-radius:50%;animation:bk 1.2s infinite}
.sp span:nth-child(2){animation-delay:0.2s}
.sp span:nth-child(3){animation-delay:0.4s}
@keyframes bk{0%{opacity:0.2}40%{opacity:1}80%{opacity:0.2}100%{opacity:0.2}}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100}
.ob{background:#161b27;border:1px solid #3a4566;border-radius:12px;padding:18px;width:360px;max-height:80vh;overflow-y:auto}
</style>
</head><body>

<div id="menu" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;padding:20px">
  <div style="text-align:center">
    <div style="font-size:32px;margin-bottom:8px">🏥</div>
    <div style="font-size:20px;font-weight:700;margin-bottom:4px">產科急症模擬遊戲</div>
    <div style="font-size:12px;color:#8892a4">OB Emergency Simulator</div>
  </div>
  <div style="width:100%;max-width:340px">
    <div style="font-size:11px;color:#5a6478;margin-bottom:8px">選擇難度</div>
    <div style="display:flex;flex-direction:column;gap:7px" id="dbts">
      <button class="cbtn" onclick="selD('student',this)">🟢 醫學生</button>
      <button class="cbtn" onclick="selD('resident',this)">🟡 住院醫師</button>
      <button class="cbtn" onclick="selD('attending',this)">🔴 主治醫師</button>
    </div>
  </div>
  <div style="width:100%;max-width:340px">
    <div style="font-size:11px;color:#5a6478;margin-bottom:8px">選擇關卡</div>
    <div style="display:flex;flex-direction:column;gap:7px">
      <button class="cbtn" onclick="go('pe')">💊 子癇前症 / HELLP</button>
      <button class="cbtn" onclick="go('pp')">🩸 前置胎盤</button>
      <button class="cbtn" onclick="go('ai')">🤖 AI 動態生成</button>
    </div>
  </div>
</div>

<div id="game" style="display:none;flex:1;flex-direction:column;overflow:hidden">
<div class="app">
  <div class="sb">
    <div class="sbs">
      <div class="sbl">Patient</div>
      <div class="ptn" id="ptn">—</div>
      <div class="pts" id="pts">—</div>
      <div id="ptb" style="margin-top:5px"></div>
    </div>
    <div class="sbs">
      <div class="sbl">母體生命徵象</div>
      <div class="vg">
        <div class="vc"><div class="vcl">BP</div><div class="vcv red" id="vbp">—</div><div class="vcu">mmHg</div></div>
        <div class="vc"><div class="vcl">HR</div><div class="vcv" id="vhr">—</div><div class="vcu">bpm</div></div>
        <div class="vc"><div class="vcl">RR</div><div class="vcv" id="vrr">—</div><div class="vcu">/min</div></div>
        <div class="vc"><div class="vcl">SpO2</div><div class="vcv grn" id="vsp">—</div><div class="vcu">%</div></div>
      </div>
    </div>
    <div class="sbs">
      <div class="sbl">胎兒</div>
      <div class="vg">
        <div class="vc"><div class="vcl">FHR</div><div class="vcv grn" id="vfh">—</div><div class="vcu">bpm</div></div>
        <div class="vc"><div class="vcl">GA</div><div class="vcv" style="font-size:13px" id="vga">—</div><div class="vcu">週</div></div>
      </div>
    </div>
    <div class="sbs">
      <div class="sbl">臨床積分</div>
      <div class="scb">
        <div class="scr"><span style="font-size:11px;color:#8892a4">處置評分</span><span class="scn" id="scn">100</span></div>
        <div class="sct"><div class="scf" id="scf" style="width:100%"></div></div>
      </div>
    </div>
    <div class="sbs">
      <div class="sbl">遊戲進度</div>
      <div class="phb">
        <div style="font-size:11px;color:#8892a4" id="phl">—</div>
        <div class="pds" id="pds"></div>
      </div>
    </div>
    <div class="sbs" style="flex:1">
      <div class="sbl">已完成檢查</div>
      <div class="dl" id="dl"></div>
    </div>
    <div style="padding:10px 12px;margin-top:auto">
      <button class="gb" style="width:100%;font-size:11px" onclick="back()">← 回主選單</button>
      <div style="font-size:9px;color:#5a6478;margin-top:8px;line-height:1.6">AI 根據 ACOG/UpToDate 評分</div>
    </div>
  </div>
  <div class="mn">
    <div class="tb"><div class="tp" id="tp">🏥 急診</div><div class="tt" id="tt">—</div></div>
    <div class="sa" id="sa"></div>
  </div>
</div>
</div>

<div class="ov" id="ov" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="ob">
    <button onclick="document.getElementById('ov').style.display='none'" style="float:right;background:none;border:none;color:#8892a4;font-size:16px;cursor:pointer">x</button>
    <div id="oc"></div>
  </div>
</div>

<script>
var API = 'https://api.anthropic.com/v1/messages';
var MODEL = 'claude-sonnet-4-6';
var G = { diff: 'resident', cid: null, score: 100, done: {}, qs: {} };

function nstSVG() {
  var g = '';
  for (var i = 0; i < 6; i++) g += '<line x1="' + (i*86) + '" y1="0" x2="' + (i*86) + '" y2="85" stroke="#2a3349" stroke-width="0.5"/>';
  for (var j = 0; j < 3; j++) g += '<line x1="0" y1="' + (15+j*25) + '" x2="520" y2="' + (15+j*25) + '" stroke="#2a3349" stroke-width="0.5"/>';
  return '<svg viewBox="0 0 520 85" style="width:100%;height:85px;display:block">'
    + '<rect width="520" height="85" fill="#252d40" rx="4"/>' + g
    + '<text x="4" y="17" font-size="8" fill="#5a6478">160</text>'
    + '<text x="4" y="42" font-size="8" fill="#5a6478">140</text>'
    + '<text x="4" y="67" font-size="8" fill="#5a6478">120</text>'
    + '<polyline fill="none" stroke="#22c55e" stroke-width="1.5" points="15,42 40,38 65,41 80,36 100,33 112,29 122,26 132,29 142,36 155,41 170,42 190,39 210,37 230,41 250,43 265,40 275,36 285,31 295,28 305,31 315,37 328,41 345,40 365,41 385,39 405,42 425,40 445,42 465,40 490,42 510,41"/>'
    + '<rect x="108" y="20" width="48" height="28" fill="none" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2" rx="2" opacity="0.7"/>'
    + '<rect x="268" y="20" width="52" height="28" fill="none" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2" rx="2" opacity="0.7"/>'
    + '<text x="109" y="58" font-size="7" fill="#22c55e">accel x1</text>'
    + '<text x="269" y="58" font-size="7" fill="#22c55e">accel x2</text>'
    + '</svg>';
}

function mkTable(rows) {
  var h = '<table class="rt">';
  rows.forEach(function(r) {
    if (r.length === 1) {
      h += '<tr><td class="rs" colspan="2">' + r[0] + '</td></tr>';
    } else {
      h += '<tr><td>' + r[0] + '</td><td class="' + (r[2]||'nm') + '">' + r[1] + '</td></tr>';
    }
  });
  return h + '</table>';
}

function mkCard(title, body) {
  var d = document.createElement('div');
  d.className = 'cd';
  d.innerHTML = '<div class="ct">' + title + '</div>' + body;
  return d;
}

function mkAlert(cls, text) {
  var d = document.createElement('div');
  d.className = 'al ' + cls;
  d.textContent = text;
  return d;
}

// Report builders
function buildReport(id) {
  var el = document.createElement('div');
  if (id === 'labs') {
    el.innerHTML = '<div class="ct">🧪 血液檢驗 <span class="br">危急值</span></div>'
      + mkTable([['CBC'],['Hemoglobin','11.2 g/dL','ok'],['Platelet','88,000 /uL','hi'],['WBC','10,800 /uL','nm'],
                 ['LFT'],['AST','186 U/L','hi'],['ALT','142 U/L','hi'],['LDH','520 U/L','hi'],
                 ['腎功能'],['Creatinine','1.1 mg/dL','lo'],['Uric Acid','7.8 mg/dL','lo']]);
    el.appendChild(mkAlert('ar', 'PLT 88k + AST/LDH 升高 = HELLP syndrome！'));
  } else if (id === 'urine') {
    el.innerHTML = '<div class="ct">🫧 尿液蛋白</div>'
      + mkTable([['Spot P/Cr','1.8 mg/mg (陽性>=0.3)','hi'],['Dipstick','3+ (+++)','hi'],['尿色','深黃色','lo']]);
    var note = document.createElement('div');
    note.style = 'font-size:10px;color:#8892a4;margin-top:6px';
    note.textContent = 'P/Cr 1.8 = 約 1800mg/day 尿蛋白，屬重度蛋白尿';
    el.appendChild(note);
  } else if (id === 'nst') {
    el.innerHTML = '<div class="ct">📈 NST <span class="bg">Reactive</span></div>' + nstSVG()
      + mkTable([['基礎胎心率','142 bpm','ok'],['加速','2次 (>=15bpm x 15秒)','ok'],['減速','無','ok'],['NST 判讀','Reactive 正常','ok']]);
  } else if (id === 'us') {
    el.innerHTML = '<div class="ct">🔊 產科超音波</div>'
      + mkTable([['胎兒'],['EFW','1820g (10th %ile)','lo'],['胎位','頭位 Vertex','nm'],
                 ['羊水 & 血流'],['AFI','7.2 cm (正常 8-24)','lo'],['S/D ratio','3.1 (正常<3.5)','nm'],['End-diastolic','Present','ok']]);
    el.appendChild(mkAlert('ay', 'EFW 10th %ile = FGR + AFI 偏低，需加強監測'));
  } else if (id === 'mgso4') {
    el.innerHTML = '<div class="ct">💊 MgSO4 硫酸鎂</div>'
      + mkTable([['Loading','4g IV over 20min','ok'],['Maintenance','2g/hr','ok']]);
    el.appendChild(mkAlert('ay', '監測：膝腱反射、尿量>25mL/hr、呼吸>12/min。備 Ca-gluconate 解毒'));
  } else if (id === 'antihtn') {
    el.innerHTML = '<div class="ct">❤️ 降壓治療</div>'
      + mkTable([['藥物','Labetalol 20mg IV','ok'],['目標 BP','140-155 / 90-105','nm']]);
    el.appendChild(mkAlert('ab', '不可降至正常值，以免胎盤灌流不足'));
  } else if (id === 'deliver') {
    el.innerHTML = '<div class="ct">🏥 分娩計畫</div>'
      + mkTable([['GA','34+2 週','nm'],['適應症','重度子癇前症+HELLP','hi'],['促肺成熟','Betamethasone 12mg IM x2','ok']]);
    el.appendChild(mkAlert('ag', '34週 + 重症 → 終止妊娠為根本治療'));
  } else if (id === 'iv') {
    el.innerHTML = '<div class="ct">💉 靜脈通路 & 血液</div>'
      + mkTable([['CBC'],['Hemoglobin','9.2 g/dL','lo'],['Platelet','185,000 /uL','nm'],
                 ['凝血'],['PT/INR','正常','ok'],['aPTT','正常','ok'],['Blood Type','O+','nm']]);
    el.appendChild(mkAlert('ay', 'Hb 9.2 輕度貧血，已建立兩條大口徑靜脈通路'));
  } else if (id === 'usp') {
    el.innerHTML = '<div class="ct">🔊 產科超音波</div>'
      + mkTable([['胎盤'],['胎盤位置','完全性前置胎盤','hi'],['覆蓋子宮頸內口','完全覆蓋','hi'],
                 ['胎兒'],['BPP','8/8 正常','ok'],['胎位','頭位 Vertex','nm'],['EFW','約 2100g','nm']]);
    el.appendChild(mkAlert('ar', '完全性前置胎盤確認 — 絕對禁止內診！'));
  } else if (id === 'nstp') {
    el.innerHTML = '<div class="ct">📈 NST <span class="bg">Reactive</span></div>' + nstSVG()
      + mkTable([['基礎胎心率','140 bpm','ok'],['加速','2次 (>=15 x 15秒)','ok'],['減速','無','ok'],['NST','Reactive','ok']]);
  }
  return el;
}

// Case definitions stored as structured data (no inline HTML strings)
var CDEF = {
  pe: {
    ptName: '陳韋玲', ptSub: 'G2P1 · 28 歲', diag: '重度子癇前症 + HELLP',
    vitals: { bp:'168/112', hr:'96', rr:'18', spo2:'98', fhr:'—', ga:'34+2' },
    phases: 6,
    chiefTitle: '急診室 14:32',
    chiefBody: '一位懷孕婦女由家屬攙扶走入急診，分診血壓 168/112 mmHg（已二次確認）。家屬告知患者頭痛劇烈、視覺模糊、上腹部疼痛。病患意識清醒，面色微蒼。',
    alertCls: 'ar', alertTxt: 'BP 168/112 mmHg x2 — 需立即評估！',
    checks: [
      { id:'labs',   ic:'🧪', lb:'申請血液檢驗',  ds:'CBC、LFT、腎功能',
        q:'根據血液報告，你發現了什麼？',
        opts:['血小板低下+肝酶升高+LDH升高，符合 HELLP syndrome','CBC 正常，僅有輕微貧血，無需特殊處置','腎功能異常為主，優先處理急性腎損傷','數值輕微異常，屬正常孕期變化，繼續觀察'],
        cor:0,         exp:'PLT 88k + AST 186 + LDH 520 三項符合 HELLP syndrome。這是重症表現，需立即處置。' },
      { id:'urine',  ic:'🫧', lb:'驗尿蛋白',       ds:'Spot P/Cr + dipstick',
        q:'尿液 P/Cr ratio 1.8，dipstick 3+，代表什麼？',
        opts:['顯著蛋白尿，符合子癇前症診斷標準','輕微蛋白尿，可能是泌尿道感染，需培養確認','P/Cr 1.8 是正常孕期範圍，不需在意','需等24小時尿蛋白結果才能確診'],
        cor:0, exp:'Spot urine P/Cr 0.3以上即為顯著蛋白尿，相當於24hr尿蛋白300mg以上。本案P/Cr 1.8 屬重度蛋白尿。' },
      { id:'nst',    ic:'📈', lb:'胎心音 NST',     ds:'電子胎兒監視器',
        q:'根據 NST 結果，你的判斷是？',
        opts:['NST Reactive，胎兒目前狀態良好，但需持續監測','NST Non-reactive，需立即剖腹產','NST 無法判讀，需改做 BPP','加速次數不足，需延長監測至60分鐘'],
        cor:0, exp:'NST Reactive 代表15分鐘內有2次以上加速，每次15bpm以上持續15秒以上，胎兒目前氧合良好。但母體病況可能快速變化，需持續監測。' },
      { id:'us',     ic:'🔊', lb:'超音波評估',     ds:'EFW、AFI、臍帶 Doppler',
        q:'超音波 EFW 10th %ile、AFI 7.2cm，代表什麼？',
        opts:['EFW 低於10th %ile 符合 FGR，AFI 偏低提示胎盤功能可能不足','EFW 10th %ile 屬正常下限，AFI 7.2 完全正常','臍帶S/D ratio 3.1 已超標，需立即終止妊娠','超音波正常，可排除胎兒窘迫'],
        cor:0, exp:'EFW 低於10th %ile 為胎兒生長遲滯 FGR。AFI 7.2cm 為輕度羊水過少（正常8-24）。整體顯示胎盤功能不足，需密切追蹤。' },

        opts:['Labetalol 20mg IV，15min後若BP仍高追加40mg，目標140-155/90-105','立即 Nifedipine 10mg 舌下含服快速降壓','不需降壓治療，等待 MgSO4 發揮作用','目標 BP 120/80，越低越好'],
        cor:0, exp:'BP 160/110以上需積極降壓。Labetalol 首選，靜脈給予。目標140-155/90-105；不可降太快以免胎盤灌流不足。舌下 Nifedipine 不建議。' },
      { id:'deliver',ic:'🏥', lb:'分娩計畫',       ds:'終止妊娠時機',
        q:'重度子癇前症 + HELLP + 34+2週，最適合的處置？',
        opts:['終止妊娠為根本治療；給 Betamethasone 後積極規劃分娩','繼續保守治療至38週再終止','先給高劑量類固醇並等待2週再評估','HELLP 可藉血漿置換治好，不需現在終止'],
        cor:0, exp:'重度子癇前症加HELLP合併34週以上，終止妊娠是根本治療。先給 Betamethasone 促肺成熟，再進行引產或剖腹。34週不應等至38週。' }
    ]
  },
  pp: {
    ptName: '林小萍', ptSub: 'G2P1 · 29 歲', diag: '完全性前置胎盤',
    vitals: { bp:'110/70', hr:'98', rr:'18', spo2:'98', fhr:'—', ga:'34' },
    phases: 6,
    chiefTitle: '急診室 09:15',
    chiefBody: '29歲孕婦，孕34週，由丈夫陪同走入急診。主訴無痛性陰道大量出血，約浸濕一片衛生棉，無腹痛。病患神情緊張，意識清醒。',
    alertCls: 'ay', alertTxt: '孕晚期出血 — 未確認胎盤位置前請勿內診！',

      { id:'iv',  ic:'💉', lb:'建立靜脈通路', ds:'IV access + CBC / 血型配對',

        cor:0, exp:'無痛性出血加上孕晚期，首要任務是超音波確認胎盤位置（排除前置胎盤）。內診在胎盤位置確認前絕對禁忌。' },
      { id:'usp', ic:'🔊', lb:'腹部超音波', ds:'胎盤位置、BPP、胎位',
        q:'確認完全性前置胎盤，下列哪項最不適當？',
        opts:['立即內診評估子宮頸擴張程度','持續胎心音監測（NST）','建立第二條靜脈通路，備血','通知新生兒科準備接生早產兒'],
        cor:0, exp:'確認前置胎盤後，內診是絕對禁忌（Absolute Contraindication）。手指觸碰可能直接撕裂胎盤，引發致命大出血。' },
      { id:'nstp',ic:'📈', lb:'胎心音監測', ds:'持續 NST',
        q:'NST Reactive，但出血持續且BP下降至90/60。此時最優先？',
        opts:['啟動緊急剖腹產並同時積極輸血復甦','繼續觀察，等血型配對結果再決定','給予 Tocolytics 延後分娩','先給 MgSO4 預防抽搐，再討論分娩計畫'],
        cor:0, exp:'前置胎盤加上血流動力學不穩定（BP 90/60）= 緊急剖腹產適應症。同時啟動大量輸血協議（MTP），通知麻醉科、新生兒科。Tocolytics 在活動性出血時禁用。' }

  }
};

// UI helpers
function setV(v) {
  var m = { bp:'vbp', hr:'vhr', rr:'vrr', spo2:'vsp', fhr:'vfh', ga:'vga' };
  Object.keys(v).forEach(function(k) { var e = document.getElementById(m[k]); if (e) e.textContent = v[k]; });
}
function updScore(d) {
  G.score = Math.max(0, Math.min(100, G.score + (d||0)));
  var c = G.score>=70 ? '#22c55e' : G.score>=40 ? '#f59e0b' : '#ef4444';
  document.getElementById('scn').textContent = G.score;
  document.getElementById('scn').style.color = c;
  document.getElementById('scf').style.width = G.score + '%';
  document.getElementById('scf').style.background = c;
}
function setPhase(p, lbl, mx) {
  if (mx) G.pmax = mx;
  document.getElementById('phl').textContent = '第 ' + p + ' 階段：' + lbl;
  var pp = ['🏥 急診接案','🔍 初步評估','📋 檢查申請','📊 報告判讀','💊 治療處置','🏁 分娩決策'];
  document.getElementById('tp').textContent = pp[Math.min(p-1, 5)];
  var el = document.getElementById('pds'); el.innerHTML = '';
  for (var i = 0; i < G.pmax; i++) {
    var d = document.createElement('div');
    d.className = 'pd' + (i < p-1 ? ' dn' : i === p-1 ? ' ac' : '');
    el.appendChild(d);
  }
}
function addDone(id, ic, lb, el) {
  G.done[id] = { ic:ic, lb:lb, el:el };
  var dl = document.getElementById('dl'); dl.innerHTML = '';
  Object.keys(G.done).forEach(function(k) {
    var c = G.done[k];
    var b = document.createElement('button');
    b.className = 'di'; b.textContent = c.ic + ' ' + c.lb;
    b.setAttribute('data-k', k);
    b.onclick = function() {
      var kk = this.getAttribute('data-k');
      document.getElementById('oc').innerHTML = '';
      var hd = document.createElement('div');
      hd.style = 'font-size:13px;font-weight:700;margin-bottom:12px;padding-right:24px';
      hd.textContent = G.done[kk].lb;
      document.getElementById('oc').appendChild(hd);
      document.getElementById('oc').appendChild(G.done[kk].el.cloneNode(true));
      document.getElementById('ov').style.display = 'flex';
    };
    dl.appendChild(b);
  });
}
function appEl(el) {
  var sa = document.getElementById('sa');
  sa.appendChild(el);
  sa.scrollTop = sa.scrollHeight;
}
function appHTML(html) {
  var d = document.createElement('div'); d.innerHTML = html;
  appEl(d);
}
function setScene(el) { document.getElementById('sa').innerHTML = ''; document.getElementById('sa').appendChild(el); }

// Quiz
function renderQuiz(chk) {
  G.qs[chk.id] = chk;
  var wrap = document.createElement('div'); wrap.className = 'qc'; wrap.id = 'q_' + chk.id;
  var qq = document.createElement('div'); qq.className = 'qq'; qq.textContent = '🧠 判讀問題：' + chk.q;
  wrap.appendChild(qq);
  var qo = document.createElement('div'); qo.className = 'qo';
  chk.opts.forEach(function(o, i) {
    var b = document.createElement('button'); b.className = 'qb';
    b.textContent = String.fromCharCode(65+i) + '. ' + o;
    b.setAttribute('data-i', i); b.setAttribute('data-cid', chk.id);
    b.onclick = function() { ansQ(chk.id, parseInt(this.getAttribute('data-i'))); };
    qo.appendChild(b);
  });
  wrap.appendChild(qo);
  appEl(wrap);
}

function ansQ(cid, chosen) {
  var chk = G.qs[cid]; if (!chk) return;
  var wrap = document.getElementById('q_' + cid); if (!wrap) return;
  wrap.querySelectorAll('.qb').forEach(function(b, i) {
    b.classList.add('off');
    if (i === chk.cor) b.className = 'qb ' + (i === chosen ? 'cor' : 'rev');
    else if (i === chosen) b.className = 'qb wrg';
  });
  var ok = chosen === chk.cor;
  updScore(ok ? 15 : -10);
  var fb = document.createElement('div');
  fb.className = 'al ' + (ok ? 'ag' : 'ar'); fb.style.marginTop = '10px';
  fb.textContent = (ok ? '✅ ' : '❌ ') + chk.exp;
  wrap.appendChild(fb);
  var nb = document.createElement('button'); nb.className = 'nb'; nb.textContent = '繼續 →';
  nb.onclick = showMenu;
  wrap.appendChild(nb);
  document.getElementById('sa').scrollTop = 99999;
}

function doCheck(idx) {
  var cs = CDEF[G.cid]; var chk = cs.checks[idx];
  if (!chk || G.done[chk.id]) return;
  var note = document.createElement('div');
  note.style = 'color:#5a6478;font-size:12px;padding:8px 0';
  note.textContent = '申請中：' + chk.lb + '...';
  appEl(note);
  setTimeout(function() {
    var rEl = buildReport(chk.id);
    var card = document.createElement('div'); card.className = 'cd';
    card.appendChild(rEl);
    addDone(chk.id, chk.ic, chk.lb, rEl);
    appEl(card);
    if (chk.id === 'nst' || chk.id === 'nstp') {
      document.getElementById('vfh').textContent = chk.id === 'nst' ? '142' : '140';
    }
    renderQuiz(chk);
  }, 500);
}

function showMenu() {
  var cs = CDEF[G.cid];
  var rem = cs.checks.filter(function(c) { return !G.done[c.id]; });
  if (rem.length === 0) { appHTML('<div class="al ag">所有關鍵檢查已完成！</div>'); showFinal(); return; }
  var wrap = document.createElement('div'); wrap.className = 'cd';
  var t = document.createElement('div'); t.className = 'ct'; t.textContent = '選擇下一步檢查或處置';
  wrap.appendChild(t);
  var grid = document.createElement('div'); grid.className = 'cg';
  cs.checks.forEach(function(ch, i) {
    var used = !!G.done[ch.id];
    var b = document.createElement('button');
    b.className = 'cbtn' + (used ? ' used' : '');
    b.innerHTML = '<span>' + ch.ic + '</span><span>' + (used ? '✓ ' : '') + ch.lb + '<br><small style="color:#5a6478;font-weight:400">' + ch.ds + '</small></span>';
    if (!used) { b.setAttribute('data-i', i); b.onclick = function() { doCheck(parseInt(this.getAttribute('data-i'))); }; }
    grid.appendChild(b);
  });
  wrap.appendChild(grid);
  appEl(wrap);
  document.getElementById('sa').scrollTop = 99999;
}

function showFinal() {
  var cs = CDEF[G.cid];
  var dl = Object.values(G.done).map(function(c) { return c.ic + ' ' + c.lb; }).join(', ');
  var col = G.score>=70 ? '#22c55e' : G.score>=40 ? '#f59e0b' : '#ef4444';
  var wrap = document.createElement('div'); wrap.className = 'cd'; wrap.style.borderColor = '#2dd4bf';
  wrap.innerHTML = '<div class="ct" style="color:#2dd4bf">🏁 案例結束</div>'
    + '<div class="cb"><strong>最終診斷：</strong>' + cs.diag + '<br><br><strong>完成的處置：</strong><br>' + dl + '</div>';
  appEl(wrap);
  var scBox = document.createElement('div'); scBox.className = 'scb'; scBox.style.padding = '14px';
  scBox.innerHTML = '<div style="font-size:13px;font-weight:700;margin-bottom:6px">最終得分</div>'
    + '<div style="font-size:32px;font-weight:700;color:' + col + '">' + G.score + ' / 100</div>';
  appEl(scBox);
  var nb = document.createElement('button'); nb.className = 'nb'; nb.textContent = '← 回主選單';
  nb.style.marginTop = '8px'; nb.onclick = back;
  appEl(nb);
}

function selD(d, btn) {
  G.diff = d;
  document.querySelectorAll('#dbts .cbtn').forEach(function(b) { b.style.borderColor='#3a4566'; b.style.color='#e8eaf0'; });
  btn.style.borderColor = '#2dd4bf'; btn.style.color = '#2dd4bf';
}

function go(cid) {
  G.cid = cid; G.score = 100; G.done = {}; G.qs = {};
  document.getElementById('menu').style.display = 'none';
  var g = document.getElementById('game'); g.style.display = 'flex'; g.style.flexDirection = 'column';
  document.getElementById('dl').innerHTML = '';
  updScore(0);
  if (cid === 'ai') { startAI(); return; }
  var cs = CDEF[cid];
  document.getElementById('ptn').textContent = cs.ptName;
  document.getElementById('pts').textContent = cs.ptSub;
  document.getElementById('ptb').innerHTML = '<span class="bdg by">待評估</span>';
  setV(cs.vitals);
  setPhase(1, '主訴接收', cs.phases);
  document.getElementById('tt').textContent = cs.diag;
  var sc = document.createElement('div');
  var ch = document.createElement('div'); ch.className = 'cd';
  var ct = document.createElement('div'); ct.className = 'ct'; ct.textContent = cs.chiefTitle; ch.appendChild(ct);
  var cb = document.createElement('div'); cb.className = 'cb'; cb.textContent = cs.chiefBody; ch.appendChild(cb);
  sc.appendChild(ch);
  var al = document.createElement('div'); al.className = 'al ' + cs.alertCls; al.textContent = cs.alertTxt;
  sc.appendChild(al);
  setScene(sc);
  setTimeout(function() { setPhase(2, '初步評估'); showMenu(); }, 800);
}

function startAI() {
  document.getElementById('ptn').textContent = '載入中...';
  var sc = document.createElement('div');
  sc.innerHTML = '<div style="display:flex;align-items:center;gap:8px;padding:20px;color:#5a6478;font-size:12px"><div class="sp"><span></span><span></span><span></span></div> AI 正在生成案例...</div>';
  setScene(sc);
  var prompt = '產生一個產科急症案例。只輸出JSON無任何markdown：'
    + '{"ptName":"中文姓名","ga":"34+2","g":2,"p":1,"age":28,'
    + '"vitals":{"bp":"168/110","hr":"95","rr":"18","spo2":"98"},'
    + '"diagnosis":"最終診斷","chief":"場景描述兩句純文字",'
    + '"checks":[{"id":"c1","ic":"🧪","lb":"檢查名稱","ds":"簡述",'
    + '"rh":"<table class=rt><tr><td>項目</td><td class=ok>數值</td></tr></table>",'
    + '"q":"判讀問題","opts":["A","B","C","D"],"cor":0,"exp":"解釋"}]}'
    + ' 難度：' + G.diff + '。急症類別隨機：胎盤早剝/臍帶脫垂/羊水栓塞/早產PPROM/宮外孕/肩難產/產後大出血/子宮破裂。';
  fetch(API, { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ model:MODEL, max_tokens:1500, messages:[{ role:'user', content:prompt }] }) })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var txt = data.content.map(function(c) { return c.text||''; }).join('');
    var j = JSON.parse(txt.replace(/```json|```/g,'').trim());
    CDEF['_ai'] = {
      ptName:j.ptName, ptSub:'G'+j.g+'P'+j.p+' · '+j.age+' 歲', diag:j.diagnosis,
      vitals:{ bp:j.vitals.bp, hr:j.vitals.hr, rr:j.vitals.rr, spo2:j.vitals.spo2, fhr:'—', ga:j.ga },
      phases:6, chiefTitle:'案例', chiefBody:j.chief, alertCls:'ay', alertTxt:'請開始評估',
      checks:(j.checks||[]).map(function(ch) {
        return { id:ch.id, ic:ch.ic||'🔍', lb:ch.lb, ds:ch.ds||'',
          q:ch.q||'你的判斷？', opts:ch.opts||['A','B','C','D'], cor:ch.cor||0, exp:ch.exp||'正確。',
          rFn: function() { var e=document.createElement('div'); e.innerHTML=ch.rh||''; return e; } };
      })
    };
    G.cid = '_ai';
    go('_ai');
  })
  .catch(function(e) {
    document.getElementById('sa').innerHTML = '<div class="al ar">AI生成失敗：' + e.message + '</div>';
  });
}

function back() {
  document.getElementById('game').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
  G.done = {}; G.qs = {};
}
</script>
</body></html>
