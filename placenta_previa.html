<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>前置胎盤臨床模擬 Placenta Previa Simulation</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
  .container{max-width:680px;margin:0 auto;padding:16px}
  button{cursor:pointer;font-family:inherit}
  .btn-back{background:transparent;border:1px solid #334155;color:#94a3b8;border-radius:8px;padding:6px 14px;font-size:13px}
  .btn-primary{background:#1d4ed8;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-weight:600;font-size:14px}
  .btn-next{background:#7c3aed;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-weight:700;font-size:14px;margin-top:14px}
  .btn-restart{background:#3b82f6;color:#fff;border:none;border-radius:10px;padding:12px 32px;font-size:15px;font-weight:700}
  .card{background:#1e293b;border-radius:14px;padding:20px;margin-bottom:14px}
  .card-dark{background:#0f172a;border-radius:12px;padding:16px;margin-bottom:14px}
  .vitals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:12px 0}
  .vital-cell{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:8px 10px}
  .vital-cell.warn{background:#fff7ed;border-color:#fed7aa}
  .vital-label{font-size:10px;color:#64748b;font-weight:600}
  .vital-value{font-size:13px;color:#1e293b;font-weight:700;margin-top:2px}
  .vital-value.warn{color:#c2410c}
  .opt-btn{width:100%;text-align:left;border-radius:10px;padding:12px 14px;font-size:14px;margin-bottom:8px;border:1.5px solid #334155;background:#1e293b;color:#e2e8f0;transition:background 0.2s,border-color 0.2s}
  .opt-btn:disabled{cursor:default}
  .opt-btn.correct{background:#14532d;border-color:#4ade80;color:#bbf7d0}
  .opt-btn.wrong{background:#450a0a;border-color:#f87171;color:#fca5a5}
  .opt-btn.show-correct{background:#1e3a2f;border-color:#4ade80;color:#86efac}
  .quiz-btn{width:100%;text-align:left;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:7px;border:1.5px solid #334155;background:#0f172a;color:#e2e8f0}
  .quiz-btn.correct{background:#14532d;border-color:#4ade80;color:#bbf7d0}
  .quiz-btn.wrong{background:#450a0a;border-color:#f87171;color:#fca5a5}
  .quiz-btn.show-correct{background:#1e3a2f;border-color:#4ade80;color:#86efac}
  .report-box{background:#0c1a2e;border:1px solid #1e40af;border-radius:12px;padding:16px;margin-bottom:14px}
  .explain-box{background:#0c1a2e;border:1px solid #1e40af;border-radius:8px;padding:12px;margin-top:10px;color:#93c5fd;font-size:13px;line-height:1.7}
  .header-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .score-positive{color:#4ade80;font-weight:700}
  .score-negative{color:#f87171;font-weight:700}
  .diff-btn{background:#f8fafc;border:2px solid #e2e8f0;border-radius:12px;padding:16px 20px;width:100%;text-align:left;margin-bottom:12px;transition:transform 0.1s}
  .diff-btn:hover{transform:scale(1.02)}
  pre{white-space:pre-wrap;font-family:inherit}
  .tag{font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px}
  .takeaway{color:#e2e8f0;font-size:13px;margin-bottom:6px}
  #screen-select,#screen-game,#screen-end{display:none}
  #screen-select.active,#screen-game.active,#screen-end.active{display:block}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     SCREEN 1: DIFFICULTY SELECT
════════════════════════════════════════════════════════ -->
<div id="screen-select" class="active">
  <div class="container" style="display:flex;align-items:center;justify-content:center;min-height:100vh">
    <div style="max-width:500px;width:100%;text-align:center">
      <div style="font-size:48px;margin-bottom:12px">🏥</div>
      <h1 style="color:#f1f5f9;font-size:22px;font-weight:800;margin-bottom:4px">前置胎盤臨床模擬</h1>
      <p style="color:#94a3b8;font-size:14px;margin-bottom:8px">Placenta Previa Clinical Simulation</p>
      <p style="color:#64748b;font-size:12px;margin-bottom:28px">資料來源：UpToDate 2024 / 2026</p>
      <button class="diff-btn" id="btn-student" onclick="startGame('student')">
        <div style="font-size:18px;font-weight:800;color:#16a34a">🟢 醫學生 Medical Student</div>
        <div style="font-size:12px;color:#64748b;margin-top:4px">G1P0・孕32週・基礎診斷流程</div>
      </button>
      <button class="diff-btn" id="btn-resident" onclick="startGame('resident')">
        <div style="font-size:18px;font-weight:800;color:#ca8a04">🟡 住院醫師 Resident</div>
        <div style="font-size:12px;color:#64748b;margin-top:4px">G3P2・孕30週・PAS多科整合</div>
      </button>
      <button class="diff-btn" id="btn-attending" onclick="startGame('attending')">
        <div style="font-size:18px;font-weight:800;color:#dc2626">🔴 主治醫師 Attending</div>
        <div style="font-size:12px;color:#64748b;margin-top:4px">G4P3・孕28週・多重合併症+倫理困境</div>
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     SCREEN 2: GAME
════════════════════════════════════════════════════════ -->
<div id="screen-game">
  <div class="container">
    <div class="header-bar">
      <button class="btn-back" onclick="resetGame()">← 返回</button>
      <div style="font-size:13px;color:#94a3b8">
        <span id="hdr-diff"></span>&nbsp;&nbsp;
        第<span id="hdr-act"></span>/<span id="hdr-total"></span>幕&nbsp;&nbsp;
        分數：<span id="hdr-score"></span>
      </div>
    </div>
    <div class="card" id="scene-card">
      <div class="tag" id="act-title"></div>
      <p id="act-scene" style="color:#e2e8f0;font-size:14px;line-height:1.7"></p>
      <div class="vitals-grid" id="vitals-grid"></div>
    </div>
    <div id="options-area"></div>
    <div id="report-area" style="display:none"></div>
    <div id="quiz-area" style="display:none"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     SCREEN 3: END
════════════════════════════════════════════════════════ -->
<div id="screen-end">
  <div class="container" style="display:flex;align-items:center;justify-content:center;min-height:100vh">
    <div style="max-width:520px;width:100%;background:#1e293b;border-radius:16px;padding:32px;text-align:center">
      <div id="end-icon" style="font-size:56px"></div>
      <h2 id="end-title" style="color:#f1f5f9;font-size:22px;margin:12px 0 6px"></h2>
      <p id="end-body" style="color:#94a3b8;font-size:14px;margin-bottom:20px"></p>
      <div style="background:#0f172a;border-radius:12px;padding:16px;margin-bottom:20px">
        <div style="color:#94a3b8;font-size:13px">總得分 Total Score</div>
        <div id="end-score" style="font-size:40px;font-weight:800"></div>
        <div id="end-pct" style="color:#64748b;font-size:13px"></div>
      </div>
      <div style="background:#0f172a;border-radius:12px;padding:16px;text-align:left;margin-bottom:20px">
        <div style="color:#fbbf24;font-weight:700;font-size:13px;margin-bottom:10px">📌 Take-home Messages</div>
        <div id="end-keys"></div>
      </div>
      <button class="btn-restart" onclick="resetGame()">重新開始</button>
    </div>
  </div>
</div>

var ENDINGS = {
  student:{icon:"👶",title:"母嬰平安",body:"剖腹產順利，Apgar 9/10，術中出血400mL，無需輸血。",
    keys:["前置胎盤診斷前禁止內診，TVUS 是首選評估工具","孕<34週穩定患者需給予類固醇促胎肺成熟","完全性前置胎盤必須剖腹，最佳時機36-37+6週"]},
  resident:{icon:"🏥",title:"母子均平安（需ICU）",body:"母親接受子宮切除術及膀胱修補，ICU恢復順利。新生兒孕35週早產，NICU照護後健康出院。",
    keys:["兩次以上剖腹產+前置胎盤 = 必須排除PAS（超音波+MRI）","PAS percreta需多科整合手術，提早至34-35週計畫分娩","大出血啟動MTP（1:1:1），Fibrinogen < 200 mg/dL立即補充Cryoprecipitate"]},
  attending:{icon:"⚖️",title:"倫理與醫療的平衡",body:"母親：Cell Saver成功，未使用異體血，子宮次全切除，ICU 5天後轉病房。嬰兒：孕28週NICU照護，3個月後健康出院。",
    keys:["有行為能力患者的書面拒絕醫療決定，在其失能後仍有效，家屬不能覆蓋","Category III FHR Tracing是緊急剖腹產的絕對指徵，不可延誤","多重合併症（PAS+重度子癇前症+DIC傾向）需多科整合，同步處置"]}
};

var DIFF_LABELS = {student:"🟢 醫學生", resident:"🟡 住院醫師", attending:"🔴 主治醫師"};

// ─── STATE ────────────────────────────────────────────────────────────────────
var state = {diff:null, actIdx:0, phase:"choose", chosen:null, quizAns:null, score:0};

function showScreen(id) {
  ["screen-select","screen-game","screen-end"].forEach(function(s){
    document.getElementById(s).classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

function startGame(diff) {
  state = {diff:diff, actIdx:0, phase:"choose", chosen:null, quizAns:null, score:0};
  showScreen("screen-game");
  render();
}

function resetGame() {
  state = {diff:null, actIdx:0, phase:"choose", chosen:null, quizAns:null, score:0};
  showScreen("screen-select");
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  var acts = ACTS[state.diff];
  var act = acts[state.actIdx];
  var scoreEl = document.getElementById("hdr-score");
  scoreEl.textContent = state.score;
  scoreEl.className = state.score >= 0 ? "score-positive" : "score-negative";
  document.getElementById("hdr-diff").textContent = DIFF_LABELS[state.diff];
  document.getElementById("hdr-diff").style.color = {student:"#16a34a",resident:"#ca8a04",attending:"#dc2626"}[state.diff];
  document.getElementById("hdr-act").textContent = state.actIdx + 1;
  document.getElementById("hdr-total").textContent = acts.length;
  document.getElementById("act-title").textContent = act.title;
  document.getElementById("act-scene").textContent = act.scene;
  renderVitals(act.vitals);
  renderOptions(act);
  renderReport(act);
  renderQuiz(act);
}

function renderVitals(vitals) {
  var grid = document.getElementById("vitals-grid");
  grid.innerHTML = "";
  Object.keys(vitals).forEach(function(k) {
    var v = vitals[k];
    var warn = v.indexOf("⬇") >= 0 || v.indexOf("⬆") >= 0;
    var cell = document.createElement("div");
    cell.className = "vital-cell" + (warn ? " warn" : "");
    cell.innerHTML = '<div class="vital-label">' + k + '</div><div class="vital-value' + (warn?" warn":"") + '">' + v + '</div>';
    grid.appendChild(cell);
  });
}

function renderOptions(act) {
  var area = document.getElementById("options-area");
  if (state.phase === "choose" || state.phase === "report") {
    var html = '<div style="color:#94a3b8;font-size:12px;font-weight:600;margin-bottom:10px">請選擇處置：</div>';
    act.options.forEach(function(opt) {
      var cls = "opt-btn";
      var extra = "";
      if (state.chosen) {
        if (opt.id === state.chosen && opt.correct) cls += " correct";
        else if (opt.id === state.chosen && !opt.correct) cls += " wrong";
        else if (opt.correct) cls += " show-correct";
      }
      var feedbackHtml = "";
      if (state.chosen === opt.id) feedbackHtml = '<div style="margin-top:6px;font-size:12px;opacity:0.9">' + opt.feedback + '</div>';
      if (state.chosen && opt.correct && state.chosen !== opt.id) feedbackHtml += '<div style="margin-top:6px;font-size:12px;color:#4ade80">← 正確答案</div>';
      html += '<button class="' + cls + '" onclick="chooseOption(\'' + opt.id + '\')" ' + (state.chosen ? "disabled" : "") + '><span style="font-weight:700;margin-right:8px">' + opt.id + '.</span>' + opt.text + feedbackHtml + '</button>';
    });
    area.innerHTML = html;
    area.style.display = "block";
  } else {
    area.style.display = "none";
  }
}

function renderReport(act) {
  var area = document.getElementById("report-area");
  if (state.phase === "report") {
    area.innerHTML = '<div class="report-box"><div style="color:#93c5fd;font-weight:700;font-size:13px;margin-bottom:8px">📋 ' + act.report.title + '</div><pre style="color:#e2e8f0;font-size:13px;line-height:1.7">' + act.report.content + '</pre><button class="btn-primary" style="margin-top:14px" onclick="goToQuiz()">繼續判讀 →</button></div>';
    area.style.display = "block";
  } else {
    area.style.display = "none";
  }
}

function renderQuiz(act) {
  var area = document.getElementById("quiz-area");
  if (state.phase === "quiz") {
    var html = '<div class="card"><div style="color:#fbbf24;font-weight:700;font-size:13px;margin-bottom:10px">📝 判讀題</div><p style="color:#e2e8f0;font-size:14px;margin-bottom:14px;line-height:1.6">' + act.quiz.q + '</p>';
    act.quiz.opts.forEach(function(o, i) {
      var cls = "quiz-btn";
      if (state.quizAns !== null) {
        if (i === state.quizAns && i === act.quiz.ans) cls += " correct";
        else if (i === state.quizAns && i !== act.quiz.ans) cls += " wrong";
        else if (i === act.quiz.ans) cls += " show-correct";
      }
      html += '<button class="' + cls + '" onclick="answerQuiz(' + i + ')" ' + (state.quizAns !== null ? "disabled" : "") + '>' + String.fromCharCode(65+i) + '. ' + o + '</button>';
    });
    if (state.quizAns !== null) {
      var acts = ACTS[state.diff];
      var isLast = state.actIdx + 1 >= acts.length;
      html += '<div class="explain-box">📚 ' + act.quiz.explain + '</div>';
      html += '<button class="btn-next" onclick="nextAct()">' + (isLast ? "查看結果 →" : "前往第" + (state.actIdx+2) + "幕 →") + '</button>';
    }
    html += '</div>';
    area.innerHTML = html;
    area.style.display = "block";
  } else {
    area.style.display = "none";
  }
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function chooseOption(id) {
  if (state.chosen) return;
  var act = ACTS[state.diff][state.actIdx];
  var opt = act.options.find(function(o){return o.id===id;});
  state.chosen = id;
  state.score += opt.correct ? 10 : -5;
  state.phase = "report";
  render();
}

function goToQuiz() {
  state.phase = "quiz";
  render();
}

function answerQuiz(i) {
  if (state.quizAns !== null) return;
  var act = ACTS[state.diff][state.actIdx];
  state.quizAns = i;
  state.score += (i === act.quiz.ans) ? 10 : -5;
  render();
}

function nextAct() {
  var acts = ACTS[state.diff];
  if (state.actIdx + 1 < acts.length) {
    state.actIdx++;
    state.phase = "choose";
    state.chosen = null;
    state.quizAns = null;
    render();
  } else {
    showEndScreen();
  }
}

function showEndScreen() {
  var e = ENDINGS[state.diff];
  var maxScore = ACTS[state.diff].length * 20;
  var pct = Math.round((state.score / maxScore) * 100);
  document.getElementById("end-icon").textContent = e.icon;
  document.getElementById("end-title").textContent = e.title;
  document.getElementById("end-body").textContent = e.body;
  var scoreEl = document.getElementById("end-score");
  scoreEl.textContent = state.score + " / " + maxScore;
  scoreEl.style.color = pct >= 60 ? "#4ade80" : "#f87171";
  document.getElementById("end-pct").textContent = pct + "%";
  var keysEl = document.getElementById("end-keys");
  keysEl.innerHTML = e.keys.map(function(k){return '<div class="takeaway">✓ ' + k + '</div>';}).join("");
  showScreen("screen-end");
}
</script>
